name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Show package metadata
        run: |
          uv run python -c "import pathlib, tomllib; data=tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')); project=data.get('project', {}); print(f\"Package: {project.get('name', 'unknown')}\"); print(f\"Version: {project.get('version', 'unknown')}\")"

      - name: Build package
        run: uv build

      - name: Publish to GitHub Packages (PyPI)
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m pip install --upgrade twine
          uv run python -m twine upload \
            --skip-existing \
            --repository-url https://upload.pypi.pkg.github.com/${{ github.repository_owner }}/ \
            dist/*
